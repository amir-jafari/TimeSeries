name: Publish to PyPI

# Triggers only when you create a GitHub Release (tag vX.Y.Z)
on:
  release:
    types: [published]

jobs:
  # ── Step 1: build the distribution archives ────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build frontend
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Rename sdist to use underscores (PyPI requirement)
        run: |
          for f in dist/timeseries-toolbox-*.tar.gz; do
            mv "$f" "${f/timeseries-toolbox-/timeseries_toolbox-}"
          done

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # ── Step 2: publish to PyPI for all releases ───────────────────────────────
  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/timeseries-toolbox

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Upload to PyPI
        run: |
          pip install twine
          python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}