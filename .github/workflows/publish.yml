name: Publish to PyPI

# Triggers only when you create a GitHub Release (tag vX.Y.Z)
on:
  release:
    types: [published]

jobs:
  # ── Step 1: build the distribution archives ────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build frontend
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # ── Step 2: always publish to TestPyPI (pre-release AND real release) ──────
  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/timeseries-toolbox

    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Fix Docker DNS (Ubuntu runner workaround)
        run: |
          echo '{"dns": ["8.8.8.8", "8.8.4.4"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.test.pypi.org/legacy/

  # ── Step 3: publish to PyPI only for real (non-pre-release) releases ───────
  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Skip this job if the release is marked as a pre-release
    if: github.event.release.prerelease == false

    environment:
      name: pypi
      url: https://pypi.org/p/timeseries-toolbox

    permissions:
      id-token: write   # required for OIDC trusted-publisher auth

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Fix Docker DNS (Ubuntu runner workaround)
        run: |
          echo '{"dns": ["8.8.8.8", "8.8.4.4"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1